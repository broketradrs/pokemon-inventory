<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Pokemon Inventory</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Pokemon Inventory</h1>

<div class="toolbar">

    <div class="toolbar-left">

        <input
            type="text"
            id="searchInput"
            placeholder="Search cards..."
        >

        <select id="sortSelect">
            <option value="default">Default</option>
            <option value="high">Price High → Low</option>
            <option value="low">Price Low → High</option>
            <option value="alpha">Alphabetical A → Z</option>
        </select>

    </div>

    <div class="toolbar-center">

        <button id="adminButton">
            Admin Login
        </button>

        <button id="exitAdminButton" style="display:none;">
            Exit Admin Mode
        </button>

    </div>

    <div class="toolbar-right" id="topPagination"></div>

</div>

    <div id="cards"></div>

    <div id="bottomPagination"></div>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    
    <div id="easterEggOverlay" style="display:none;">
        <img id="easterEggImage" src="https://cdn.discordapp.com/attachments/1166595568496287765/1517611981710950621/IMG_1866.jpg?ex=6a36e9cc&is=6a35984c&hm=0b4fd7268521f04b1239a0967249be5d73b330a921ebfdd12ab8c7aa753c1c62&">
    </div>

    
    <div id="cardViewer" style="display:none;">
        <div id="cardViewerContent">
            <img id="viewerImage">
            <h2 id="viewerName"></h2>
            <p id="viewerCondition"></p>
            <p id="viewerPrice"></p>
        </div>
    </div>
    
    <script src="script.js"></script>

</body>
</html>
